services:
  redis:
    image: redis:7-alpine
    container_name: shadowhubble-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shadowhubble-api
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    environment:
      # ❌ REMOVE DATABASE_URL from here
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      DEBUG: "true"
    depends_on:
      redis:
        condition: service_healthy
    mem_limit: 2g
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-exclude '.venv/*' --reload-exclude '__pycache__/*'
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 3

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shadowhubble-worker
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      # ❌ REMOVE DATABASE_URL from here
      PYTHONPATH: /app
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - redis
      - backend
    mem_limit: 3g
    command: watchmedo auto-restart --directory=/app --pattern="*.py" --recursive -- celery -A app.workers.celery_app worker --loglevel=info -Q features,training,monitoring,celery --pool=solo

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shadowhubble-ui
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: /api/v1
      # In containerized Vite dev server, proxy target must use Docker service DNS.
      VITE_API_PROXY_TARGET: http://backend:8000
      NODE_OPTIONS: "--max-old-space-size=1024"
    depends_on:
      - backend
    mem_limit: 1g
    command: npm run dev -- --host "::"

volumes:
  redis_data:
