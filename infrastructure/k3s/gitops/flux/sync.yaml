apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: shadowhubble
  namespace: flux-system
spec:
  interval: 1m0s
  url: https://github.com/chandan-akshronix/Fraud_Detection_MLOPS_Platform.git # Replace with your actual repo URL
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: shadowhubble-dev
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./infrastructure/k3s/overlays/dev
  prune: true
  sourceRef:
    kind: GitRepository
    name: shadowhubble
  targetNamespace: dev
  wait: true
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: backend
      namespace: dev
    - apiVersion: apps/v1
      kind: Deployment
      name: frontend
      namespace: dev
---

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: shadowhubble-kubecost
  namespace: flux-system
spec:
  interval: 1h
  path: ./infrastructure/k3s/gitops/kubecost
  prune: true
  sourceRef:
    kind: GitRepository
    name: shadowhubble
  wait: true
