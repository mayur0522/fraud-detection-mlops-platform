apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: kubecost
  namespace: flux-system
spec:
  interval: 1h
  url: https://kubecost.github.io/cost-analyzer/
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: kubecost
  namespace: kubecost
spec:
  interval: 1h
  chart:
    spec:
      chart: cost-analyzer
      version: ">=1.0.0"
      sourceRef:
        kind: HelmRepository
        name: kubecost
        namespace: flux-system
  install:
    createNamespace: true
  values:
    kubecostToken: "cmVhbHRpbWUtY29zdC1tb25pdG9yaW5n" # Community version token
    prometheus:
      enabled: true # Use internal Prometheus for cost tracking
    reporting:
      valuesReporting: false
