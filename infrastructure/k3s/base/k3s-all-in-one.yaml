# --- 1. NAMESPACE ---
apiVersion: v1
kind: Namespace
metadata:
  name: mlops-prod
  labels:
    name: mlops-prod

---
# --- 2. SECRETS ---
apiVersion: v1
kind: Secret
metadata:
  name: mlops-secrets
  namespace: mlops-prod
type: Opaque
stringData:
  # The GitHub Actions pipeline will replace these placeholders or they will be deployed securely via SOPS/External Secrets
  DATABASE_URL: "postgres://USER:PASSWORD@ep-serverless-neon-url.neon.tech/neondb?sslmode=require"
  REDIS_URL: "redis://redis-master.mlops-prod.svc.cluster.local:6379"
  AZURE_STORAGE_CONNECTION_STRING: ""
  AZURE_B2C_TENANT_NAME: ""
  AZURE_B2C_CLIENT_ID: ""

---
# --- 3. REDIS DEPLOYMENT (IN-CLUSTER) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: mlops-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-master
  namespace: mlops-prod
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379

---

# --- 4. BACKEND API (PYTHON) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: mlops-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: ghcr.io/yourusername/shadowhubble-api:latest  # Updated by CI/CD
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: mlops-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: mlops-prod
spec:
  selector:
    app: backend
  ports:
  - port: 8000
    targetPort: 8000

---
# --- 5. CELERY WORKER ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: mlops-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: ghcr.io/yourusername/shadowhubble-worker:latest # Updated by CI/CD
        imagePullPolicy: Always
        envFrom:
        - secretRef:
            name: mlops-secrets

---
# --- 6. FRONTEND (VITE REACT) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: mlops-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/yourusername/shadowhubble-ui:latest # Updated by CI/CD
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        envFrom:
        - secretRef:
            name: mlops-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: mlops-prod
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80

---
# --- 7. GATEWAY API (ROUTING) ---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: external-gateway-class
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: mlops-gateway
  namespace: mlops-prod
spec:
  gatewayClassName: external-gateway-class
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api-route
  namespace: mlops-prod
spec:
  parentRefs:
  - name: mlops-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api
    backendRefs:
    - name: backend-service
      port: 8000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
  namespace: mlops-prod
spec:
  parentRefs:
  - name: mlops-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: frontend-service
      port: 80
