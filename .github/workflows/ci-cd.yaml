name: DevSecOps & MLOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint-and-sast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Linting & SAST Tools
        run: |
          pip install flake8 black bandit

      - name: Run Black Formatting Check
        run: black --check backend/ || echo "Black formatting issues found."

      - name: Run Flake8 Linting
        run: flake8 backend/ --max-line-length=120 || echo "Flake8 found issues."

      - name: Run Bandit (SAST)
        run: bandit -r backend/ -ll -q || echo "Bandit found vulnerabilities."

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          head: ${{ github.ref_name }}
          extra_args: --only-verified


  mlops-unit-tests:
    needs: lint-and-sast
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-test-secret-key
      DEBUG: "true"
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |

          python -m pip install --upgrade pip
          pip install poetry poetry-plugin-export jaraco.context==6.1.0 starlette==0.49.1 wheel==0.46.2

          # Add uv installation
          pip install uv

          rm -f uv.lock poetry.lock
          poetry export -f requirements.txt --output requirements.txt --without-hashes
          uv pip install --system -r requirements.txt pytest pytest-asyncio pytest-cov

      - name: Run Pytest (ML Data Validation & Unit Tests)
        run: |
          PYTHONPATH=. pytest tests/ -v --cov=app --cov=ml --cov-report=xml --junitxml=test-results.xml
          sed -i 's/filename="/filename="backend\//g' coverage.xml


      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        with:
          projectBaseDir: .
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }} # Fallback to SonarCloud if not set
        continue-on-error: true

  build-and-push:
    needs: mlops-unit-tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          load: true # Load into Docker daemon so Trivy can scan it
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/shadowhubble-api:${{ github.ref_name }}-${{ github.sha }}

      - name: Run Trivy vulnerability scanner on Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ github.repository_owner }}/shadowhubble-api:${{ github.ref_name }}-${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Backend Image
        run: docker push ${{ env.REGISTRY }}/${{ github.repository_owner }}/shadowhubble-api:${{ github.ref_name }}-${{ github.sha }}



      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/shadowhubble-ui:${{ github.ref_name }}-${{ github.sha }}

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.0.0"

      - name: Update Manifests (GitOps)
        run: |
          # Update the image tags in the dev overlay for GitOps
          cd infrastructure/k3s/overlays/dev
          kustomize edit set image shadowhubble-api=${{ env.REGISTRY }}/${{ github.repository_owner }}/shadowhubble-api:${{ github.ref_name }}-${{ github.sha }}
          kustomize edit set image shadowhubble-ui=${{ env.REGISTRY }}/${{ github.repository_owner }}/shadowhubble-ui:${{ github.ref_name }}-${{ github.sha }}

      - name: Commit and Push Changes for Flux
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add infrastructure/k3s/overlays/dev/kustomization.yaml
          git commit -m "chore(gitops): update dev images to ${{ github.ref_name }}-${{ github.sha }}" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref_name }}
